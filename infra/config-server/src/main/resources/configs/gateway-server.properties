# Comments and compilations — now served by event-service
spring.cloud.gateway.routes[0].id=event-service-comments-private
spring.cloud.gateway.routes[0].uri=lb://event-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/*/comments/**

