spring.application.name=analyzer
server.port=0

spring.config.import=configserver:
spring.cloud.config.discovery.enabled=true
spring.cloud.config.discovery.service-id=config-server
spring.cloud.config.fail-fast=true
spring.cloud.config.retry.max-attempts=10
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-interval=10000
spring.cloud.config.retry.multiplier=1.5

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

grpc.server.port=0

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

analyzer.kafka.consumer.group-id.user-actions=analyzer-actions
analyzer.kafka.consumer.group-id.event-similarity=analyzer-similarity
analyzer.kafka.consumer.auto-offset-reset=earliest

analyzer.kafka.topic.user-actions=stats.user-actions.v1
analyzer.kafka.topic.event-similarity=stats.events-similarity.v1

spring.sql.init.mode=always
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/ewm_analyzer
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:12345}
spring.jpa.hibernate.ddl-auto=none
